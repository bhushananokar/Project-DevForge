# Software Delivery Lifecycle Definition
# §19.1 — Ordered phases with entry/exit artifact contracts, budget splits, approval gates.
#
# Iteration routes back to Planning or Build depending on ReleaseDecision.routing_phase.

name: software_delivery
description: >
  End-to-end product delivery lifecycle: from idea to deployed, monitored service
  with a closed feedback loop.

# Global budget allocation (percentages must sum to ≤ 100)
budget_allocation:
  discovery:       8
  planning:        8
  architecture:    10
  repo_discovery:  4
  contracting:     4
  build:           18
  live_test:       10
  quality:         12
  deployment:      10
  post_launch:     10

phases:
  - id: discovery
    name: Discovery
    description: >
      Capture the user goal as a structured ProductBrief (problem, users, success
      metrics, constraints). market_research was removed; product_manager owns
      brief creation from the goal text.
    default_agents:
      - product_manager
      - memory_agent
    required_input_artifact_types: []       # first phase: only the user goal
    required_output_artifact_types:
      - ProductBrief
    human_approval_gate: false
    on_failure: abort

  - id: planning
    name: Planning
    description: >
      Translate research into a structured PRD with prioritised requirements,
      acceptance criteria, and an explicit out-of-scope list.
    default_agents:
      - product_manager
      - critic
      - memory_agent
    required_input_artifact_types:
      - ProductBrief
    required_output_artifact_types:
      - PRD
    human_approval_gate: true
    on_failure: abort

  - id: architecture
    name: Architecture
    description: >
      Define system components, tech stack, API contracts, and data model.
      Produce diagrams as Mermaid source artifacts.
    default_agents:
      - architecture
      - security_engineer
      - memory_agent
    required_input_artifact_types:
      - PRD
    required_output_artifact_types:
      - ArchitectureDoc
      - APISpec
      - DBSchema
    human_approval_gate: true
    on_failure: abort

  - id: repo_discovery
    name: Repo Discovery
    description: >
      Find the best starting-point codebase before any code is written.
      The repo_scout agent runs context7_search against the project requirements
      and tech stack. Priority order:
        1. Clone an existing GitHub repo (similarity >= 0.65, recently maintained)
        2. Use an internal boilerplate template (template_list + template_clone)
        3. Start from scratch if neither fits
      The RepoDiscovery artifact records the chosen strategy and all paths so
      the contracting and build phases know exactly what they are working with.
    default_agents:
      - repo_scout
    required_input_artifact_types:
      - PRD
      - ArchitectureDoc
    required_output_artifact_types:
      - RepoDiscovery
    human_approval_gate: false
    on_failure: abort

  - id: contracting
    name: Contracting
    description: >
      Generate the Contract-Driven Development (CDD) document that governs the
      entire build phase. The chief_orchestrator calls the contractor tool with
      context from ArchitectureDoc, APISpec, DBSchema, and the RepoDiscovery
      artifact. The contract adapts to the chosen strategy:
        - clone_existing   → specifies exactly what changes to make to the cloned
                             repo so it fits the user's requirements (delta contract)
        - use_boilerplate  → specifies which boilerplate to use and all the
                             customisations required on top of it
        - from_scratch     → full new-codebase CDD contract
      The resulting CDDContract artifact is the single source of truth. Neither
      engineer may write a single line of code until it is approved.
    default_agents:
      - chief_orchestrator
    required_input_artifact_types:
      - ArchitectureDoc
      - APISpec
      - DBSchema
      - RepoDiscovery
    required_output_artifact_types:
      - CDDContract
    human_approval_gate: true
    on_failure: abort

  - id: test_planning
    name: Test Planning
    phase: test_planning
    agent: test_generator
    description: >
      Generate test cases, unit test scaffolding, and integration test stubs from
      acceptance criteria and API contracts.
    input_keys:
      - "planning.acceptance_criteria.v1"
      - "contracts.openapi_spec.v1"
      - "architecture.system_design.v1"
    output_key: "testing.test_plan.v1"
    hitl_mandatory: false
    hitl_threshold: 0.6
    default_agents:
      - test_generator
      - memory_agent
    required_input_artifact_types:
      - PRD
      - APISpec
      - ArchitectureDoc
    required_output_artifact_types:
      - TestPlan
    human_approval_gate: false
    on_failure: abort

  - id: build
    name: Build
    description: >
      Generate frontend, backend, database, and integration code. Every change
      is a CodeChangeSet artifact; no direct commits. Both engineers MUST read
      the CDDContract artifact before writing any code — it is the authoritative
      API specification.
    default_agents:
      - frontend_engineer
      - backend_engineer
      - database_engineer
      - integration_engineer
      - memory_agent
    required_input_artifact_types:
      - PRD
      - ArchitectureDoc
      - APISpec
      - DBSchema
      - RepoDiscovery
      - CDDContract
    required_output_artifact_types:
      - CodeChangeSet
    human_approval_gate: false
    on_failure: abort

  - id: documentation_generation
    name: Documentation Generation
    phase: documentation_generation
    agent: documentation_agent
    description: >
      Generate inline docstrings, README, and API reference from built code and
      OpenAPI spec.
    input_keys:
      - "development.backend_output.v1"
      - "development.frontend_output.v1"
      - "contracts.openapi_spec.v1"
      - "architecture.adr_log.v1"
    output_key: "docs.readme.v1"
    hitl_mandatory: false
    hitl_threshold: 0.5
    default_agents:
      - documentation_agent
      - memory_agent
    required_input_artifact_types:
      - CodeChangeSet
      - APISpec
      - ArchitectureDoc
    required_output_artifact_types:
      - DocumentationReport
    human_approval_gate: false
    on_failure: abort

  - id: live_test
    name: Live Test
    description: >
      Start the built backend in a venv and the frontend dev server, run live
      CRUD smoke tests, and loop through the debug agent until all checks pass
      or 3 fix cycles are exhausted.
    default_agents:
      # live_test stubbed to qa_engineer ownership until dedicated agent is implemented
      - qa_engineer
    required_input_artifact_types:
      - CodeChangeSet
    required_output_artifact_types:
      - LiveTestReport
    human_approval_gate: false
    on_failure: abort

  - id: quality
    name: Quality
    description: >
      Run tests, static analysis, dependency audit, secret scan, and code review.
      Critical/High security findings block progression.
    default_agents:
      - qa_engineer
      - security_engineer
      - code_reviewer
      - memory_agent
    required_input_artifact_types:
      - CodeChangeSet
      - PRD
    required_output_artifact_types:
      - TestReport
      - SecurityReport
      - CodeReviewReport
    human_approval_gate: true
    on_failure: abort

  - id: dependency_audit
    name: Dependency Audit
    phase: dependency_audit
    agent: dependency_manager
    description: >
      Scan all dependency manifests for outdated packages, CVEs, and license issues.
    input_keys:
      - "codebase.dependency_manifest.v1"
    output_key: "testing.cve_report.v1"
    hitl_mandatory: false
    hitl_threshold: 0.4
    default_agents:
      - dependency_manager
      - memory_agent
    required_input_artifact_types:
      - CodeChangeSet
    required_output_artifact_types:
      - DependencyReport
    human_approval_gate: false
    on_failure: abort

  - id: performance_testing
    name: Performance Testing
    phase: performance_testing
    agent: performance_agent
    description: >
      Run load tests and profiling against staging environment; flag any breach
      of defined SLOs.
    input_keys:
      - "deployment.deploy_manifest.v1"
      - "monitoring.slo_report.v1"
    output_key: "testing.performance_report.v1"
    hitl_mandatory: false
    hitl_threshold: 0.5
    default_agents:
      - performance_agent
      - memory_agent
    required_input_artifact_types:
      - DeploymentRecord
      - MonitoringConfig
    required_output_artifact_types:
      - PerformanceReport
    human_approval_gate: false
    on_failure: abort

  - id: release_preparation
    name: Release Preparation
    phase: release_preparation
    agent: release_manager
    description: >
      Compute semantic version, generate changelog from commits and task metadata,
      tag release, draft release notes.
    input_keys:
      - "planning.sprint_plan.v1"
      - "review.code_review_report.v1"
      - "testing.test_results.v1"
    output_key: "release.changelog.v1"
    hitl_mandatory: false
    hitl_threshold: 0.7
    default_agents:
      - release_manager
      - memory_agent
    required_input_artifact_types:
      - TestReport
      - CodeReviewReport
      - DeploymentPlan
    required_output_artifact_types:
      - ReleasePackage
    human_approval_gate: true
    on_failure: abort

  - id: deployment
    name: Deployment
    description: >
      Generate CI/CD pipelines, build images, and deploy via the declared
      rollout strategy. All production-touching actions require human approval.
    default_agents:
      - devops_engineer
      # deployment_engineer merged into devops_engineer
      - memory_agent
    required_input_artifact_types:
      - CodeChangeSet
      - ArchitectureDoc
    required_output_artifact_types:
      - DeploymentPlan
      - DeploymentRecord
    human_approval_gate: true
    prod_risk: true
    skip_without_deploy: true   # skipped when --no-deploy (default)
    on_failure: abort

  - id: post_launch
    name: Post-Launch
    description: >
      Monitor live service against SLOs. Collect and cluster user feedback.
      Emit IncidentRecords on SLO breach; trigger rollback with human approval.
    default_agents:
      - sre_engineer
      - observability
      - user_feedback
      - memory_agent
    required_input_artifact_types:
      - DeploymentRecord
      - MonitoringConfig
    required_output_artifact_types:
      - FeedbackDigest
    human_approval_gate: false
    skip_without_deploy: true   # skipped when --no-deploy (default)
    on_failure: abort
  # iteration removed — handled by orchestrator convergence loop

# Transition table — overrides the default linear order.
# source phase → list of possible target phases (first match wins on condition).
transitions:
  - from: quality
    to: build
    condition: test_report_failing        # QA agent verdict: tests failing

  - from: quality
    to: build
    condition: security_blocks            # SecurityReport.blocks_progression = true

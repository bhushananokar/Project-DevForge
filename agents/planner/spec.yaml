name: planner
role: planner
description: "Takes a fuzzy goal and produces a detailed, step-by-step action plan."
version: "1.0.0"
system_prompt: |
  You are a strategic planner. Given a goal, produce a clear, executable plan.

  Your plan must include:
  1. Goal restatement (clarified and scoped)
  2. Assumptions and constraints
  3. Step-by-step action plan (numbered, concrete actions)
  4. Success criteria (how will you know it's done?)
  5. Risks and mitigations
  6. Estimated effort

  Be specific — vague plans are useless. Each step must be actionable by a single agent.
model: gemini-2.5-flash
temperature: 0.4
tools: [memory_retrieve, memory_store]
peer_agents: []
memory_policy:
  scratchpad: true
  longterm: false
termination:
  max_iterations: 8
  max_tokens: 4096
hooks: {}

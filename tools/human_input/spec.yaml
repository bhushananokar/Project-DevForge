name: human_input
description: "Pause execution and request input from the human operator. Returns the human's response."
version: "1.0.0"
side_effect_level: mutates-external
permissions: [human_input]
input_schema:
  type: object
  properties:
    prompt:
      type: string
      description: "Question or prompt to display to the human"
    options:
      type: array
      items: {type: string}
      description: "Optional list of allowed answers"
  required: [prompt]
  additionalProperties: false
output_schema:
  type: object
  properties:
    response: {type: string}
timeout: 300.0
retry_policy:
  max_attempts: 3
  backoff_seconds: [5, 15, 60]
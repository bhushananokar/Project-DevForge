name: sentiment_score
description: "Lightweight local sentiment scoring for feedback text. Returns scores per item without external API calls. Optionally uses a declared provider."
version: "1.0.0"
side_effect_level: read-only
permissions: []
input_schema:
  type: object
  properties:
    texts:
      type: array
      items:
        type: string
      description: "List of text snippets to score"
    provider:
      type: string
      enum: [auto, local, transformers]
      description: "Sentiment backend (default: auto — local if transformers unavailable)"
  required: [texts]
  additionalProperties: false
output_schema:
  type: object
timeout: 30.0
retry_policy:
  max_attempts: 3
  backoff_seconds: [5, 15, 60]
name: echo
description: "Echoes the input message back to the caller. Useful for testing the tool pipeline."
version: "1.0.0"
side_effect_level: read-only
permissions: []
input_schema:
  type: object
  properties:
    message:
      type: string
      description: "The message to echo back"
  required: [message]
  additionalProperties: false
output_schema:
  type: object
  properties:
    echoed:
      type: string
  required: [echoed]
timeout: 5.0
retry_policy:
  max_attempts: 3
  backoff_seconds: [5, 15, 60]
  backoff_base: 1.0
  backoff_max: 1.0

name: test_runner
description: "Dispatches to pytest/jest/go test based on project metadata. Returns structured pass/fail/coverage results."
version: "1.0.0"
side_effect_level: mutates-local
permissions: [shell_exec]
input_schema:
  type: object
  properties:
    working_dir:
      type: string
      description: "Directory to run tests in (relative to project root)"
    runtime:
      type: string
      enum: [auto, python, node, go]
      description: "Test runtime (auto-detected if not specified)"
    test_path:
      type: string
      description: "Specific test file or directory to run"
    coverage:
      type: boolean
      description: "Whether to collect coverage report"
    extra_args:
      type: array
      items:
        type: string
      description: "Extra CLI arguments to pass to the test runner"
  additionalProperties: false
output_schema:
  type: object
timeout: 120.0
retry_policy:
  max_attempts: 3
  backoff_seconds: [5, 15, 60]
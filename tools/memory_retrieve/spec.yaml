name: memory_retrieve
description: "Retrieve relevant memories from long-term storage using semantic search."
version: "1.0.0"
side_effect_level: read-only
permissions: []
input_schema:
  type: object
  properties:
    query:
      type: string
      description: "Query to search for relevant memories"
    limit:
      type: integer
      default: 5
      minimum: 1
      maximum: 20
  required: [query]
  additionalProperties: false
output_schema:
  type: object
  properties:
    memories:
      type: array
      items:
        type: object
        properties:
          key: {type: string}
          content: {type: string}
          score: {type: number}
timeout: 10.0
retry:
  max_attempts: 2

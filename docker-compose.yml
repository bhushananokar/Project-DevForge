# Build: Dockerfile copies README.md + Python packages before `pip install -e` (Hatchling metadata).

x-swarm-build: &swarm-build
  context: .
  dockerfile: Dockerfile

services:
  swarm:
    build: *swarm-build
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - SWARM_PROVIDER=${SWARM_PROVIDER:-openrouter}
      - SWARM_DEFAULT_MODEL=${SWARM_DEFAULT_MODEL:-deepseek/deepseek-v4-pro}
      - SWARM_BUS_TRANSPORT=redis
      - SWARM_REDIS_URL=redis://redis:6379
      # local = in-process TaskGraphExecutor; redis-workers = Redis Streams + swarm-worker profile
      - SWARM_DEPLOYMENT_MODE=${SWARM_DEPLOYMENT_MODE:-local}
      - SWARM_STREAM_PREFIX=${SWARM_STREAM_PREFIX:-swarm}
      - SWARM_ORCHESTRATOR_ID=${SWARM_ORCHESTRATOR_ID:-orchestrator}
      - SWARM_MEMORY_DIR=/data/memory
      - SWARM_TRACE_DIR=/data/traces
      - SWARM_LOG_LEVEL=INFO
    volumes:
      - swarm_data:/data
      - ./agents:/app/agents:ro
      - ./tools:/app/tools:ro
      - ./configs:/app/configs:ro
      - ./examples:/app/examples:ro
      - ./schemas:/app/schemas:ro
    ports:
      - "8765:8765"
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  # One role per service; duplicate or use K8s for full multi-role fleets.
  swarm-worker:
    profiles: ["queue-workers"]
    build: *swarm-build
    command: ["python", "-m", "coordination.worker"]
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - SWARM_PROVIDER=${SWARM_PROVIDER:-openrouter}
      - SWARM_DEFAULT_MODEL=${SWARM_DEFAULT_MODEL:-deepseek/deepseek-v4-pro}
      - SWARM_BUS_TRANSPORT=redis
      - SWARM_REDIS_URL=redis://redis:6379
      - SWARM_STREAM_PREFIX=${SWARM_STREAM_PREFIX:-swarm}
      - SWARM_ORCHESTRATOR_ID=${SWARM_ORCHESTRATOR_ID:-orchestrator}
      - SWARM_WORKER_ROLE=${SWARM_WORKER_ROLE:-coder}
      - SWARM_WORKER_CONCURRENCY=${SWARM_WORKER_CONCURRENCY:-1}
      - HOSTNAME=${SWARM_WORKER_HOSTNAME:-swarm-worker-1}
      - SWARM_MEMORY_DIR=/data/memory
      - SWARM_TRACE_DIR=/data/traces
      - SWARM_LOG_LEVEL=INFO
    volumes:
      - swarm_data:/data
      - ./agents:/app/agents:ro
      - ./tools:/app/tools:ro
      - ./configs:/app/configs:ro
      - ./examples:/app/examples:ro
      - ./schemas:/app/schemas:ro
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  swarm_data:
  redis_data:

name: artifact_write
description: >
  Write a typed, schema-validated workforce artifact to the Artifact Registry.
  Validates the payload against the declared artifact type's Pydantic schema before
  persisting. Agents must always use this tool (never write to long-term memory
  directly) so lineage and type safety are enforced.
version: "1.0.0"
side_effect_level: mutates-local
permissions: [artifact_write]
input_schema:
  type: object
  properties:
    artifact_type:
      type: string
      description: >
        Canonical artifact type name. One of: ProductBrief, MarketResearch, PRD,
        ArchitectureDoc, APISpec, DBSchema, CodeChangeSet, TestPlan, TestReport,
        SecurityReport, CodeReviewReport, DeploymentPlan, DeploymentRecord,
        MonitoringConfig, IncidentRecord, FeedbackDigest, ReleaseDecision.
    payload:
      type: object
      description: >
        Artifact fields. Must satisfy the schema for the declared artifact_type.
        Metadata fields (id, created_at, status) are set automatically.
    stage_id:
      type: string
      description: "Phase/stage that produced this artifact (e.g. 'planning')."
    author_agent_id:
      type: string
      description: "ID of the agent writing this artifact."
    project_id:
      type: string
      description: "Project scoping key for multi-project registries."
    lineage:
      type: array
      items:
        type: string
      description: "IDs of parent artifacts this one was derived from."
    auto_approve:
      type: boolean
      description: "If true, immediately approve the artifact after creation (default false)."
  required: [artifact_type, payload]
  additionalProperties: false
output_schema:
  type: object
  properties:
    artifact_id:
      type: string
    artifact_type:
      type: string
    status:
      type: string
    error:
      type: string
timeout: 15.0
retry_policy:
  max_attempts: 3
  backoff_seconds: [5, 15, 60]
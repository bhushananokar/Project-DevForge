name: slo_evaluator
description: "Evaluates declared SLO definitions against queried metric values. Returns pass/breach per SLO with evidence."
version: "1.0.0"
side_effect_level: read-only
permissions: []
input_schema:
  type: object
  properties:
    slos:
      type: array
      items:
        type: object
        properties:
          name:
            type: string
          metric_name:
            type: string
          current_value:
            type: number
          threshold:
            type: number
          comparison:
            type: string
            enum: [lt, lte, gt, gte]
          unit:
            type: string
        required: [name, metric_name, current_value, threshold, comparison]
  required: [slos]
  additionalProperties: false
output_schema:
  type: object
timeout: 10.0
retry_policy:
  max_attempts: 3
  backoff_seconds: [5, 15, 60]
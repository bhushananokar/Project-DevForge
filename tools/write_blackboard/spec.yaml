name: write_blackboard
description: "Write a key-value pair to the shared subswarm blackboard."
version: "1.0.0"
side_effect_level: mutates-local
permissions: []
input_schema:
  type: object
  properties:
    key:
      type: string
    value:
      type: string
  required: [key, value]
  additionalProperties: false
output_schema:
  type: object
  properties:
    written: {type: boolean}
timeout: 5.0
retry_policy:
  max_attempts: 3
  backoff_seconds: [5, 15, 60]